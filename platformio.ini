; PlatformIO project configuration
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; The device was originally flashed under Arduino IDE using a custom
; "ALKS ESP32" board entry. If that board is not a plain esp32dev
; (different flash size / pin mapping), swap the board id above for
; the closest match in `pio boards espressif32`.

lib_deps =
	bodmer/TFT_eSPI@2.5.43

; TFT_eSPI is configured entirely via build_flags (no edits to the library's
; User_Setup.h) - see https://github.com/Bodmer/TFT_eSPI#configuring-via-platformioini
; Wiring: AZ-Delivery 2.4" 240x320 ILI9341 + XPT2046 touch.
; T_IRQ (GPIO32) is wired but unused - TFT_eSPI polls the touch controller
; over SPI instead of using the interrupt line.
build_flags =
	-D USER_SETUP_LOADED=1
	-D ILI9341_DRIVER=1
	-D TFT_WIDTH=240
	-D TFT_HEIGHT=320
	-D TFT_MISO=23
	-D TFT_MOSI=19
	-D TFT_SCLK=18
	-D TFT_CS=5
	-D TFT_DC=27
	-D TFT_RST=33
	-D TOUCH_CS=14
	-D LOAD_GLCD=1
	-D LOAD_FONT2=1
	-D LOAD_FONT4=1
	-D SPI_FREQUENCY=40000000
	-D SPI_READ_FREQUENCY=20000000
	-D SPI_TOUCH_FREQUENCY=2500000

; OTA-Uploads: Rechner muss im ESP32-GPM8330-WLAN eingebucht sein.
; Nutzung: pio run -t upload -e esp32dev_ota
; (USB-Flashen bleibt Standard: pio run -t upload -e esp32dev)
[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags =
	--auth=12345678
